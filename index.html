<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Pet Home - 温暖家</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Quicksand', sans-serif;
            background-color: #FFFDF6; /* 极浅奶油黄 */
            color: #4A4A4A;
            overflow: hidden;
        }

        /* 粘土拟态效果 (Claymorphism) */
        .clay-card {
            background: rgba(255, 255, 255, 0.7);
            border-radius: 32px;
            box-shadow: 10px 10px 20px #E5E2D7, -10px -10px 20px #FFFFFF;
            backdrop-filter: blur(8px);
        }

        .agent-btn {
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0px rgba(0, 0, 0, 0.05);
        }

        .agent-btn:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 15px 20px rgba(0, 0, 0, 0.08);
        }

        .agent-btn:active {
            transform: translateY(2px) scale(0.95);
            box-shadow: 0 2px 0px rgba(0, 0, 0, 0.05);
        }

        /* 宠物浮动动画 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .pet-float {
            animation: float 4s ease-in-out infinite;
        }

        /* 气泡对话框动画 */
        .bubble {
            position: relative;
            background: #ffffff;
            border-radius: 20px;
            filter: drop-shadow(0 4px 10px rgba(0,0,0,0.05));
        }
        .bubble::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 10px 10px 0;
            border-style: solid;
            border-color: #ffffff transparent transparent;
        }

        /* 背景装饰圆点 */
        .bg-blob {
            position: absolute;
            z-index: -1;
            filter: blur(60px);
            opacity: 0.4;
        }
    </style>
</head>
<body class="h-screen w-full flex flex-col items-center justify-between p-6 overflow-hidden">

    <!-- 背景装饰 -->
    <div class="bg-blob w-72 h-72 bg-yellow-200 top-10 left-10 rounded-full"></div>
    <div class="bg-blob w-96 h-96 bg-pink-200 bottom-20 right-10 rounded-full"></div>

    <!-- 顶部：状态栏 -->
    <header class="w-full max-w-md flex justify-between items-center py-4">
        <div>
            <h1 class="text-2xl font-bold text-pink-500">Hi, 主人 👋</h1>
            <p class="text-gray-500 text-sm">家里一切正常，空气很清新</p>
        </div>
        <div class="clay-card px-4 py-2 text-orange-400 font-bold">
            ☀️ 24°C
        </div>
    </header>

    <!-- 中部：宠物交互区 -->
    <main class="flex-1 flex flex-col items-center justify-center w-full">
        <!-- 对话气泡 -->
        <div class="bubble mb-10 px-6 py-4 max-w-xs text-center text-lg font-medium">
            <span id="pet-speech">今天想给家里换个心情吗？</span>
        </div>

        <!-- AI 宠物主体 (这里用Emoji代替，实际可放Gif/Lottie) -->
        <div class="pet-float text-[120px] cursor-pointer" onclick="petTap()">
            🐶
        </div>
    </main>

    <!-- 底部：Agent 入口 -->
    <footer class="w-full max-w-lg mb-4">
        <div class="clay-card p-6 flex justify-around items-center gap-2">
            
            <!-- Agent: Buddy 管家汪 -->
            <button onclick="updateAction('Buddy', '🐶', '没问题！全家设备已就绪~', 'bg-yellow-100 text-yellow-600')" class="agent-btn flex flex-col items-center">
                <div class="w-16 h-16 bg-yellow-100 rounded-3xl flex items-center justify-center text-3xl mb-2">🐶</div>
                <span class="text-xs font-bold">管家汪</span>
            </button>

            <!-- Agent: Mimi 慵懒猫 -->
            <button onclick="updateAction('Mimi', '🐱', '灯光已调暗，晚安好梦~', 'bg-purple-100 text-purple-600')" class="agent-btn flex flex-col items-center">
                <div class="w-16 h-16 bg-purple-100 rounded-3xl flex items-center justify-center text-3xl mb-2">🐱</div>
                <span class="text-xs font-bold">慵懒猫</span>
            </button>

            <!-- Agent: Turbo 元气兔 -->
            <button onclick="updateAction('Turbo', '🐰', '突突突！地板正在变干净！', 'bg-orange-100 text-orange-600')" class="agent-btn flex flex-col items-center">
                <div class="w-16 h-16 bg-orange-100 rounded-3xl flex items-center justify-center text-3xl mb-2">🐰</div>
                <span class="text-xs font-bold">元气兔</span>
            </button>

            <!-- Agent: Ducky 治愈鸭 -->
            <button onclick="updateAction('Ducky', '🐤', '热水已经放好了，快去泡澡吧！', 'bg-blue-100 text-blue-600')" class="agent-btn flex flex-col items-center">
                <div class="w-16 h-16 bg-blue-100 rounded-3xl flex items-center justify-center text-3xl mb-2">🐤</div>
                <span class="text-xs font-bold">治愈鸭</span>
            </button>

            <!-- Agent: Nutty 松鼠 -->
            <button onclick="updateAction('Nutty', '🐿️', '冰箱里还有新鲜的苹果哦！', 'bg-green-100 text-green-600')" class="agent-btn flex flex-col items-center">
                <div class="w-16 h-16 bg-green-100 rounded-3xl flex items-center justify-center text-3xl mb-2">🐿️</div>
                <span class="text-xs font-bold">松鼠厨神</span>
            </button>

        </div>
    </header>

    <script>
        const speechElement = document.getElementById('pet-speech');
        const petBody = document.querySelector('.pet-float');

        // 点击 Agent 的交互逻辑
        function updateAction(name, emoji, text, colorClass) {
            // 切换宠物形象
            petBody.innerText = emoji;
            // 切换对话文字
            speechElement.innerText = text;
            // 简单的小震动反馈
            petBody.style.transform = 'scale(1.2)';
            setTimeout(() => {
                petBody.style.transform = '';
            }, 200);

            console.log(`AI Agent ${name} 已激活`);
        }

        // 点击宠物本体的交互
        function petTap() {
            const randomSpeeches = [
                "哎呀，别挠我痒痒~",
                "今天心情真不错！",
                "主人，你今天真好看！",
                "有什么我可以帮你的吗？"
            ];
            const randomText = randomSpeeches[Math.floor(Math.random() * randomSpeeches.length)];
            speechElement.innerText = randomText;
        }
    </script>
</body>
</html>
